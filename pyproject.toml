[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
]
ignore = [
    "B008", # function calls in default arguments
]

[tool.ruff.lint.isort]
known-first-party = ["bot", "config", "utils"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
